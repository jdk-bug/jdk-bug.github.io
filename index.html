<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jdk-bug - Homepage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: block;
            border: 4px solid #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        h1 {
            color: #2d3748;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: #718096;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .bio {
            color: #4a5568;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .link-button {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .link-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
            padding: 1.5rem;
            background: #f7fafc;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #718096;
            font-size: 0.9rem;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #a0aec0;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .card {
                padding: 2rem;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <img src="https://avatars.githubusercontent.com/jdk-bug?v=4" alt="jdk-bug" class="avatar">
                <h1>jdk-bug</h1>
                <p class="tagline">Developer & Open Source Enthusiast</p>
            </div>

            <p class="bio">
                Welcome to my GitHub homepage! I'm passionate about coding, 
                open source projects, and building useful software.
            </p>

            <div class="stats">
                <div class="stat">
                    <div class="stat-number">🚀</div>
                    <div class="stat-label">Projects</div>
                </div>
                <div class="stat">
                    <div class="stat-number">💻</div>
                    <div class="stat-label">Code</div>
                </div>
                <div class="stat">
                    <div class="stat-number">📚</div>
                    <div class="stat-label">Learning</div>
                </div>
            </div>

            <div class="links">
                <a href="https://github.com/jdk-bug" class="link-button">
                    <span>📦 GitHub Profile</span>
                </a>
                <a href="https://github.com/jdk-bug?tab=repositories" class="link-button">
                    <span>🗂️ Repositories</span>
                </a>
                <a href="https://github.com/jdk-bug/my-first-project" class="link-button">
                    <span>🎯 My First Project</span>
                </a>
            </div>

            <div class="footer">
                <p>© 2026 jdk-bug • Hosted on GitHub Pages</p>
            </div>
        </div>
    </div>
</body>
</html>
